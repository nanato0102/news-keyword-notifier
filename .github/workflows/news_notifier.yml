name: Financial & M&A News Notifier

on:
  schedule:
    - cron: '0 23 * * *' # 日本時間の朝8:00
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install feedparser requests

      - name: Fetch and Notify News
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python - <<EOF
          import feedparser
          import requests
          import os
          import urllib.parse

          # 検索キーワード
          keywords = 'M&A "Corporate Finance" Investment Banking "Cross-border deal"'
          
          # キーワードをURLで使用可能な形式（%xx）に変換
          encoded_keywords = urllib.parse.quote(keywords)
          rss_url = f"https://news.google.com/rss/search?q={encoded_keywords}&hl=en-US&gl=US&ceid=US:en"

          def fetch_news():
              # ユーザーエージェントを設定（アクセス拒否対策）
              feed = feedparser.parse(rss_url)
              entries = feed.entries[:5]
              
              if not entries:
                  return None
                  
              news_items = []
              for entry in entries:
                  title = entry.title
                  source = entry.source.get('title', 'Unknown')
                  link = entry.link
                  news_items.append(f"**【Title】** {title}\n**【Source】** {source}\n**【Link】** {link}\n")
              
              return news_items

          webhook_url = os.environ.get('WEBHOOK_URL')
          if not webhook_url:
              print("Error: WEBHOOK_URL is not set")
              exit(1)

          news_list = fetch_news()

          if news_list:
              message = "🗞️ **Financial & M&A News Top 5**\n\n" + "\n".join(news_list)
          else:
              message = "🗞️ No major news found today."

          # Discord送信
          res = requests.post(webhook_url, json={"content": message})
          if res.status_code != 204:
              print(f"Discord API Error: {res.status_code}")
          EOF
