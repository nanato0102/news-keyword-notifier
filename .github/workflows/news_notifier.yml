name: Financial & M&A News Notifier

on:
  schedule:
    - cron: '0 23 * * *' # 日本時間の朝8:00
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install feedparser requests

      - name: Fetch and Notify News
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python - <<EOF
          import feedparser
          import requests
          import os

          # URLをエンコード済みの形式で直接指定（エラー回避のため）
          # キーワード: M&A, Corporate Finance, Investment Banking, Cross-border deal
          rss_url = "https://news.google.com/rss/search?q=M%26A%20%22Corporate%20Finance%22%20%22Investment%20Banking%22%20%22Cross-border%20deal%22&hl=en-US&gl=US&ceid=US:en"

          def fetch_news():
              # フィードの解析
              feed = feedparser.parse(rss_url)
              entries = feed.entries[:5]
              
              if not entries:
                  return None
                  
              news_items = []
              for entry in entries:
                  title = entry.title
                  source = entry.source.get('title', 'Unknown')
                  link = entry.link
                  news_items.append(f"**【Title】** {title}\n**【Source】** {source}\n**【Link】** {link}\n")
              
              return news_items

          webhook_url = os.environ.get('WEBHOOK_URL')
          if not webhook_url:
              print("Error: WEBHOOK_URL is not set")
              exit(1)

          news_list = fetch_news()

          if news_list:
              # メッセージ送信（確実に改行されるように結合）
              message = "🗞️ **Financial & M&A News Top 5**\n\n" + "\n".join(news_list)
          else:
              message = "🗞️ No major news found today."

          # Discord送信
          requests.post(webhook_url, json={"content": message})
          EOF
