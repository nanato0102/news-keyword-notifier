name: Financial & M&A News Notifier

on:
  schedule:
    - cron: '0 23 * * *' # 日本時間の朝8:00
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install feedparser requests

      - name: Fetch and Notify News
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python - <<EOF
          import feedparser
          import requests
          import os

          # キーワードを少し広めに設定 (M&A OR "Corporate Finance" OR "Finance")
          rss_url = "https://news.google.com/rss/search?q=M%26A%20OR%20Finance%20OR%20Business&hl=en-US&gl=US&ceid=US:en"

          def fetch_news():
              feed = feedparser.parse(rss_url)
              entries = feed.entries[:5]
              
              if not entries:
                  return []
                  
              news_items = []
              for entry in entries:
                  title = entry.title
                  source = entry.source.get('title', 'Unknown')
                  link = entry.link
                  news_items.append(f"**【Title】** {title}\n**【Source】** {source}\n**【Link】** {link}")
              
              return news_items

          webhook_url = os.environ.get('WEBHOOK_URL')
          news_list = fetch_news()

          # メッセージの中身があるか確認
          if news_list:
              message = "🗞️ **Financial & M&A News Top 5**\n\n" + "\n\n".join(news_list)
          else:
              # テストのために、ニュースがない場合も通知を送るようにしてみます
              message = "🗞️ 本日の大きな金融ニュースは見つかりませんでした。"

          # Discord送信を実行し、結果をログに出す
          print(f"Sending message to Discord: {message[:50]}...")
          res = requests.post(webhook_url, json={"content": message})
          
          # 送信結果のステータスコードを表示
          print(f"Discord Response Status: {res.status_code}")
          
          # エラーがあれば明示的に終了させる
          if res.status_code != 204:
              print(f"Error sending message: {res.text}")
          EOF
